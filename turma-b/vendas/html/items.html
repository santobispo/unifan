<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Itens — Vendas</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <div id="toast-container" aria-live="polite"></div>
    <header id="site-header"></header>

    <main class="page-wrap">
      <div class="toolbar">
        <div>
          <h1 class="page-title">Itens</h1>
          <p class="page-sub">Produtos à venda. Ative ou desative itens conforme necessário.</p>
        </div>
        <div style="display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap">
          <span class="toolbar__info"><span id="count-items">0</span> no catálogo</span>
          <button type="button" class="btn btn--amber" id="btn-novo-item">+ Novo item</button>
        </div>
      </div>
      <div id="items-grid" class="card-grid"></div>
    </main>

    <div id="modal-item" class="modal-overlay" aria-hidden="true">
      <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="modal-item-title">
        <div class="modal-head">
          <div>
            <h2 id="modal-item-title">Novo item</h2>
            <p id="modal-item-sub">Dados do produto</p>
          </div>
          <button type="button" class="modal-close" id="btn-cancel-item-x" aria-label="Fechar">✕</button>
        </div>
        <div class="modal-body">
          <div class="field">
            <label for="f-item-nome">Nome <span style="color: #b91c1c">*</span></label>
            <input id="f-item-nome" class="field-input" type="text" maxlength="255" autocomplete="off" />
          </div>
          <div class="form-row">
            <div class="field">
              <label for="f-item-valor">Valor (R$) <span style="color: #b91c1c">*</span></label>
              <input id="f-item-valor" class="field-input" type="number" step="0.01" min="0" />
            </div>
            <div class="field">
              <label for="f-item-tipo">Tipo <span style="color: #b91c1c">*</span></label>
              <select id="f-item-tipo" class="field-input"></select>
            </div>
          </div>
          <div class="field">
            <label for="f-item-desc">Descrição <span style="color: #b91c1c">*</span></label>
            <textarea id="f-item-desc" class="field-input" rows="3" maxlength="255"></textarea>
          </div>
        </div>
        <div class="modal-foot">
          <button type="button" class="btn btn--ghost" id="btn-cancel-item">Cancelar</button>
          <button type="button" class="btn btn--primary" id="btn-save-item">Salvar</button>
        </div>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/layout.js"></script>
    <script src="../js/items-page.js"></script>
    <script>
      document.getElementById('btn-cancel-item-x').addEventListener('click', function () {
        window.VendasApp.closeModal('modal-item');
      });
    </script>
  </body>
</html>
